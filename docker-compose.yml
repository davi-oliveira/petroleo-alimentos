services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food-api
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Petroleo Alimentos
      APP_VERSION: 1.0.0
      SECRET_KEY: troque-esta-chave-em-producao-12345678
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      DATABASE_URL: sqlite:///./food.db
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
    volumes:
      - ./food.db:/app/food.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: food-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
